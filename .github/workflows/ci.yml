name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test runner
        run: pip install pytest
      - name: Run test suite
        run: pytest -q
      - name: Offline demo smoke test
        run: python demo.py --cycles 3
      - name: Runner dry-run smoke test
        run: python runner.py --once --dry-run
